# Evolution API isolada, para o cenário "backend rodando LOCALMENTE (fora do Docker)".
# A Evolution sobe com o próprio Postgres/Redis (isolados) e conversa com o Django
# local via host.docker.internal. Não conflita com os serviços locais.
#
# Uso:
#   docker compose -f docker-compose.evolution.yml up -d
#   # painel: http://localhost:8080/manager  (login com a EVOLUTION_API_KEY)
#
# As variáveis vêm do .env do projeto (EVOLUTION_API_KEY etc.).
services:
  evolution:
    image: evoapicloud/evolution-api:v2.3.7
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://evolution:evolution@evolution-db:5432/evolution
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://evolution-redis:6379/0
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_LOCAL_ENABLED: "false"
    extra_hosts:
      # Permite que a Evolution (container) alcance o Django rodando no host.
      - "host.docker.internal:host-gateway"
    depends_on:
      evolution-db:
        condition: service_healthy
      evolution-redis:
        condition: service_healthy

  evolution-db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: evolution
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: evolution
    volumes:
      - evolution_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evolution"]
      interval: 5s
      timeout: 5s
      retries: 5

  evolution-redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  evolution_pgdata:
